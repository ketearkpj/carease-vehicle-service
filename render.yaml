services:
  - type: web
    runtime: node
    name: carease-api
    plan: free
    region: oregon
    rootDir: BackEnd
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_AUTO_SYNC
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: carease-db
          property: connectionString
      - key: CLIENT_URL
        fromService:
          name: carease-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CLIENT_URL_PROD
        fromService:
          name: carease-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CLIENT_URLS
        fromService:
          name: carease-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_EMAIL
        value: admin@carease.co.ke
      - key: ADMIN_PHONE
        value: "+254700000000"
      - key: EMAIL_FROM
        value: CAR EASE <noreply@carease.co.ke>
      - key: SUPPORT_EMAIL
        value: support@carease.co.ke
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    runtime: static
    name: carease-frontend
    rootDir: FrontEnd
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: carease-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_PAYPAL_CLIENT_ID
        sync: false
      - key: VITE_MPESA_CONSUMER_KEY
        sync: false
      - key: VITE_FLUTTERWAVE_PUBLIC_KEY
        sync: false

databases:
  - name: carease-db
    plan: free
    region: oregon
    databaseName: carease
    user: carease
